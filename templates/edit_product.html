<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Edit Product</h2>

    <form method="POST">

        <label>Name</label>
        <input type="text"
               name="name"
               class="form-control"
               value="{{ product.name }}"
               required>
        <br>

        <label>Price</label>
        <input type="number"
               name="price"
               class="form-control"
               value="{{ product.price }}"
               required>
        <br>

        <label>Description</label>
        <textarea name="description"
                  class="form-control"
                  required>{{ product.description }}</textarea>
        <br>

        <label>Image</label>
        <input type="text"
               name="image"
               class="form-control"
               value="{{ product.image }}"
               required>
        <br>

        <button type="submit" class="btn btn-warning">
            Update Product
        </button>

    </form>

</div>

</body>
</html>
