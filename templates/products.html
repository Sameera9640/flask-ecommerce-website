<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">E-Commerce</a>

        <div>

            <a class="btn btn-outline-light me-2" href="/">
                Home
            </a>

            <a class="btn btn-outline-light me-2" href="/products">
                Products
            </a>

            <a class="btn btn-outline-light me-2" href="/cart">
                Cart
            </a>

            <a class="btn btn-outline-light me-2" href="/login">
                Login
            </a>

            <a class="btn btn-outline-light" href="/register">
                Register
            </a>

        </div>

    </div>
</nav>

<div class="container mt-4">

    <h1 class="text-center">Products</h1>
    <div class="mb-3">
    <a href="/products" class="btn btn-secondary">All</a>
    <a href="/products?category=Electronics" class="btn btn-primary">
        Electronics
    </a>
</div>

    <form method="GET" action="/products" class="mb-4">
        <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search Product">
    </form>

    <div class="row">

        {% for product in products %}

        <div class="col-md-4">

            <div class="card mb-4">

                <div class="card-body text-center">

                    <img src="{{ url_for('static', filename='images/' + product.image) }}"
                         width="250"
                         class="mb-3">

                    <h4>
                        <a href="/product/{{ product.id }}"
                           style="text-decoration:none;">
                            {{ product.name }}
                        </a>
                    </h4>

                    <p><strong>₹{{ product.price }}</strong></p>

                    <p>{{ product.description }}</p>

                    <a href="/add_to_cart/{{ product.id }}"
                       class="btn btn-primary">
                        Add To Cart
                    </a>
                    <a href="/add_to_wishlist/{{ product.id }}"
                        class="btn btn-danger">
                         ❤️ Wishlist
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
