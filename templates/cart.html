<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">E-Commerce</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light me-2" href="/products">Products</a>
            <a class="btn btn-outline-light me-2" href="/cart">Cart</a>
            <a class="btn btn-outline-light me-2" href="/login">Login</a>
            <a class="btn btn-outline-light" href="/register">Register</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <h2>Shopping Cart</h2>

    {% if products %}

        {% for product in products %}

        <div class="card mb-3">
            <div class="card-body">

                <h4>{{ product.name }}</h4>

                <p>Price: ₹{{ product.price }}</p>

                <p>

                    <a href="/decrease_quantity/{{ product.id }}"
                       class="btn btn-danger btn-sm">
                        -
                    </a>

                    <strong class="mx-2">
                        {{ cart_items[loop.index0].quantity }}
                    </strong>

                    <a href="/increase_quantity/{{ product.id }}"
                       class="btn btn-success btn-sm">
                        +
                    </a>

                </p>

                <a href="/remove_from_cart/{{ product.id }}"
                   class="btn btn-danger">
                    Remove
                </a>

            </div>
        </div>

        {% endfor %}

        <h3>Total: ₹{{ total }}</h3>

        <a href="/checkout" class="btn btn-success">
            Checkout
        </a>

    {% else %}

        <div class="alert alert-warning">
            Your cart is empty.
        </div>

    {% endif %}

</div>

</body>
</html>
