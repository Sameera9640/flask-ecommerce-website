<!DOCTYPE html>
<html>
<head>
    <title>Wishlist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1>❤️ My Wishlist</h1>

    {% if products %}

        {% for product in products %}

        <div class="card mb-3">
            <div class="card-body">

                <h4>{{ product.name }}</h4>

                <p>₹{{ product.price }}</p>

                <a href="/add_to_cart/{{ product.id }}"
                   class="btn btn-primary">
                    Add To Cart
                </a>
                <a href="/move_to_cart/{{ product.id }}"
                   class="btn btn-success">
                    Move To Cart
                </a>

                <a href="/remove_from_wishlist/{{ product.id }}"
                   class="btn btn-danger">
                    Remove
                </a>

            </div>
        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-warning">
            Wishlist is empty.
        </div>

    {% endif %}

</div>

</body>
</html>
