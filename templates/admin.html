<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1>Admin Dashboard</h1>
    <div class="row mb-4">

    <div class="col-md-4">
        <div class="card text-center">
            <div class="card-body">
                <h5>Total Products</h5>
                <h2>{{ total_products }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center">
            <div class="card-body">
                <h5>Total Orders</h5>
                <h2>{{ total_orders }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-center">
            <div class="card-body">
                <h5>Total Revenue</h5>
                <h2>₹{{ revenue }}</h2>
            </div>
        </div>
    </div>

</div>

    <a href="/add_product" class="btn btn-primary mb-3">
        Add New Product
    </a>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>

        {% for product in products %}

        <tr>
            <td>{{ product.id }}</td>
            <td>{{ product.name }}</td>
            <td>₹{{ product.price }}</td>

            <td>
                <a href="/edit_product/{{ product.id }}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="/delete_product/{{ product.id }}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
