<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">E-Commerce</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light me-2" href="/products">Products</a>
            <a class="btn btn-outline-light me-2" href="/cart">Cart</a>
            <a class="btn btn-outline-light me-2" href="/login">Login</a>
            <a class="btn btn-outline-light" href="/register">Register</a>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <h2>User Registration</h2>

    <form method="POST">

        <label>Username:</label>
        <input type="text" name="username" class="form-control" required>
        <br>

        <label>Email:</label>
        <input type="email" name="email" class="form-control" required>
        <br>

        <label>Password:</label>
        <input type="password" name="password" class="form-control" required>
        <br>

        <button type="submit" class="btn btn-success">
            Register
        </button>

    </form>

</div>

</body>
</html>
