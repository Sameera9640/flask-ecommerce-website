<!DOCTYPE html>
<html>
<head>
    <title>Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Order History</h2>

    <table class="table table-bordered">

        <tr>
            <th>Order ID</th>
            <th>Total Amount</th>
        </tr>

        {% for order in orders %}

        <tr>
            <td>{{ order.id }}</td>
            <td>₹{{ order.total }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
