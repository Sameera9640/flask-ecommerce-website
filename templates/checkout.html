<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="/">E-Commerce</a>

        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-outline-light me-2" href="/products">Products</a>
            <a class="btn btn-outline-light me-2" href="/cart">Cart</a>
            <a class="btn btn-outline-light me-2" href="/login">Login</a>
            <a class="btn btn-outline-light" href="/register">Register</a>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <div class="card">

        <div class="card-body text-center">

            <h2>Checkout</h2>

            <hr>

            <h3>Total Amount: ₹{{ total }}</h3>

            <br>

            <form method="POST">

                <button type="submit" class="btn btn-success btn-lg">
                    Place Order
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
